<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Video Player</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Error Message Display */
        #errorMessage {
            color: #ff4444;
            font-size: 14px;
            margin-bottom: 15px;
            display: none;
            background: rgba(255, 68, 68, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        /* Player Wrapper */
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16 / 9; 
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            cursor: none;
            -webkit-tap-highlight-color: transparent;
        }

        .player-wrapper.show-controls {
            cursor: default;
        }

        video {
            width: 100%;
            height: 100%; 
            display: block;
            user-select: none;
            object-fit: contain;
        }
        
        .player-wrapper.show-controls video {
            cursor: pointer;
        }

        /* LOADING SPINNER */
        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 48px;
            height: 48px;
            margin-top: -24px;
            margin-left: -24px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none; 
            z-index: 20;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Title */
        .video-title {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            background: linear-gradient(rgba(0, 0, 0, 0.6), transparent);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.35s ease;
            pointer-events: none;
            z-index: 10;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-wrapper.show-controls .video-title {
            opacity: 1;
        }

        /* Blurred Center Play/Pause Button */
        .center-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.3);
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 11;
        }

        .player-wrapper.show-controls .center-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .center-btn svg {
            width: 28px;
            height: 28px;
            fill: #fff;
        }

        /* Controls Container */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            padding: 40px 16px 14px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            z-index: 10;
        }

        .player-wrapper.show-controls .controls {
            opacity: 1;
            pointer-events: auto;
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            margin-bottom: 12px;
            transition: height 0.15s ease;
        }

        .progress-container:hover {
            height: 7px;
        }

        .progress-bar {
            height: 100%;
            background: #e0e0e0;
            border-radius: 4px;
            position: relative;
            width: 0%;
            transition: background 0.2s;
        }

        .progress-container:hover .progress-bar {
            background: #ffffff;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 13px;
            height: 13px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.15s ease;
            box-shadow: 0 0 6px rgba(0,0,0,0.4);
        }

        .progress-container:hover .progress-bar::after {
            transform: translateY(-50%) scale(1);
        }

        .buffer-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            width: 0%;
            pointer-events: none;
        }

        /* Tooltip */
        .time-tooltip {
            position: absolute;
            top: -32px;
            background: rgba(20, 20, 20, 0.9);
            color: #fff;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            pointer-events: none;
            opacity: 0;
            transform: translateX(-50%);
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        .progress-container:hover .time-tooltip {
            opacity: 1;
        }

        /* Controls Row */
        .controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .controls-left,
        .controls-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Buttons */
        .ctrl-btn {
            background: none;
            border: none;
            color: #e0e0e0;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, transform 0.15s;
        }

        .ctrl-btn:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .ctrl-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Time Display */
        .time-display {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.3px;
            user-select: none;
            margin-left: 4px;
        }

        .time-display .current {
            color: #ffffff;
        }

        /* 5s Skip Badges */
        .skip-badge {
            position: absolute;
            top: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(6px);
            color: #fff;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .skip-badge.left { left: 15%; transform: translateY(-50%) scale(0.8); }
        .skip-badge.right { right: 15%; transform: translateY(-50%) scale(0.8); }
        .skip-badge.show { opacity: 1; transform: translateY(-50%) scale(1); }

        /* Fullscreen styles */
        .player-wrapper:fullscreen { border-radius: 0; max-width: 100%; }
        .player-wrapper:-webkit-full-screen { border-radius: 0; max-width: 100%; }

        /* Speed & Quality Menus */
        .popup-menu {
            position: absolute;
            bottom: 60px;
            background: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 10px;
            padding: 6px 0;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            min-width: 100px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 50;
        }

        .speed-menu { right: 16px; }
        .quality-menu { right: 55px; } 

        .popup-menu.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .popup-menu::-webkit-scrollbar { width: 4px; }
        .popup-menu::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }

        .menu-option {
            display: block;
            width: 100%;
            padding: 7px 18px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-align: left;
            transition: color 0.15s, background 0.15s;
        }

        .menu-option:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .menu-option.active { color: #fff; font-weight: 600; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .player-wrapper { animation: fadeUp 0.6s ease forwards; }
    </style>
</head>
<body>

    <div id="errorMessage"></div>

    <div class="player-wrapper show-controls" id="playerWrapper">
        <div class="loading-spinner" id="loadingSpinner"></div>

        <div class="video-title" id="videoTitle"></div>

        <div class="skip-badge left" id="skipBadgeLeft">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
            5s
        </div>
        <div class="skip-badge right" id="skipBadgeRight">
            5s
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
        </div>

        <button class="center-btn" id="centerBtn" title="Play/Pause">
            <svg viewBox="0 0 24 24" id="centerIcon">
                <path d="M8 5v14l11-7z" />
            </svg>
        </button>

        <video id="video" preload="metadata" playsinline autoplay muted></video>

        <div class="popup-menu speed-menu" id="speedMenu">
            <button class="menu-option speed-option" data-speed="0.25">0.25x</button>
            <button class="menu-option speed-option" data-speed="0.5">0.5x</button>
            <button class="menu-option speed-option" data-speed="0.75">0.75x</button>
            <button class="menu-option speed-option active" data-speed="1">1x</button>
            <button class="menu-option speed-option" data-speed="1.25">1.25x</button>
            <button class="menu-option speed-option" data-speed="1.5">1.5x</button>
            <button class="menu-option speed-option" data-speed="2">2x</button>
        </div>

        <div class="popup-menu quality-menu" id="qualityMenu">
            </div>

        <div class="controls" id="controls">
            <div class="progress-container" id="progressContainer">
                <div class="buffer-bar" id="bufferBar"></div>
                <div class="progress-bar" id="progressBar"></div>
                <div class="time-tooltip" id="timeTooltip">0:00</div>
            </div>

            <div class="controls-row">
                <div class="controls-left">
                    <button class="ctrl-btn" id="playBtn" title="Play">
                        <svg viewBox="0 0 24 24" fill="currentColor" id="playIcon">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>

                    <button class="ctrl-btn" id="volumeBtn" title="Mute/Unmute">
                        <svg viewBox="0 0 24 24" fill="currentColor" id="volumeIcon">
                            </svg>
                    </button>

                    <div class="time-display">
                        <span class="current" id="currentTime">0:00</span>
                        <span> / </span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="controls-right">
                    <button class="ctrl-btn" id="qualityBtn" title="Video Quality" style="font-size:12px;font-weight:600;width:auto;padding:2px 6px;">
                        Auto
                    </button>

                    <button class="ctrl-btn" id="speedBtn" title="Playback Speed" style="font-size:12px;font-weight:600;width:auto;padding:2px 6px;">
                        1x
                    </button>

                    <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">
                        <svg viewBox="0 0 24 24" fill="currentColor" id="fullscreenIcon">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const centerBtn = document.getElementById('centerBtn');
        const centerIcon = document.getElementById('centerIcon');
        const loadingSpinner = document.getElementById('loadingSpinner'); 
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const bufferBar = document.getElementById('bufferBar');
        const timeTooltip = document.getElementById('timeTooltip');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeBtn = document.getElementById('volumeBtn');
        const volumeIcon = document.getElementById('volumeIcon');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenIcon = document.getElementById('fullscreenIcon');
        
        const speedBtn = document.getElementById('speedBtn');
        const speedMenu = document.getElementById('speedMenu');
        const qualityBtn = document.getElementById('qualityBtn');
        const qualityMenu = document.getElementById('qualityMenu');
        
        const playerWrapper = document.getElementById('playerWrapper');
        const videoTitle = document.getElementById('videoTitle');
        const errorMessage = document.getElementById('errorMessage');
        const skipBadgeLeft = document.getElementById('skipBadgeLeft');
        const skipBadgeRight = document.getElementById('skipBadgeRight');

        let lastVolume = 1; 
        let hideControlsTimer;
        let isVideoLoaded = false; 
        let isSeeking = false; 

        let videoQualities = {};
        let currentQuality = '';

        // ==========================================
        // SMART SPINNER & BUFFERING LOGIC (NAYA FIX)
        // ==========================================
        video.addEventListener('loadstart', () => {
            loadingSpinner.style.display = 'block';
            centerBtn.style.display = 'none';
        });

        // Jab video internet slow hone ki wajah se atke (buffer ho)
        video.addEventListener('waiting', () => {
            loadingSpinner.style.display = 'block';
            centerBtn.style.display = 'none';
        });

        // Jab video chalne ke liye data load kar chuka ho
        video.addEventListener('canplay', () => {
            loadingSpinner.style.display = 'none';
            if(video.paused) centerBtn.style.display = 'flex';
        });

        // Jab video asal me play hone lage
        video.addEventListener('playing', () => {
            loadingSpinner.style.display = 'none';
        });

        // ==========================================
        // SMART QUALITY RENDER LOGIC
        // ==========================================
        function renderQualityOptions() {
            qualityMenu.innerHTML = ''; 
            const qualities = Object.keys(videoQualities);
            
            if(qualities.length === 0) {
                qualityBtn.style.display = 'none'; 
                return;
            }

            if(qualities.length === 1) {
                qualityBtn.style.display = 'block'; 
                qualityBtn.textContent = qualities[0];
                qualityBtn.style.pointerEvents = 'none'; 
                return;
            }

            qualityBtn.style.pointerEvents = 'auto'; 
            qualities.forEach(q => {
                const btn = document.createElement('button');
                btn.className = `menu-option quality-option ${q === currentQuality ? 'active' : ''}`;
                btn.textContent = q;
                btn.addEventListener('click', () => changeQuality(q));
                qualityMenu.appendChild(btn);
            });
            qualityBtn.textContent = currentQuality;
        }

        function changeQuality(newQuality) {
            if (newQuality === currentQuality) return;
            const cTime = video.currentTime;
            const isPaused = video.paused;
            
            currentQuality = newQuality;
            qualityBtn.textContent = newQuality;
            video.src = videoQualities[newQuality];
            video.currentTime = cTime; 
            
            if (!isPaused) video.play(); 
            renderQualityOptions(); 
            qualityMenu.classList.remove('open');
        }

        // ==========================================
        // FETCH FROM RENDER BACKEND
        // ==========================================
        async function loadVideoFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v'); 

            if (videoId) {
                try {
                    // Spinner yahan on hoga
                    loadingSpinner.style.display = 'block';
                    centerBtn.style.display = 'none';
                    videoTitle.textContent = ""; 
                    
                    const backendUrl = `https://aurora-backend-tu8d.onrender.com/api/video/${videoId}`;
                    
                    const response = await fetch(backendUrl);
                    const data = await response.json();

                    // Yahan se spinner 'none' karne ka logic hata diya gaya hai.
                    // Ab spinner tabhi gayab hoga jab 'video' tag khud bolega ki wo ready hai.

                    if (data.success) {
                        videoQualities = {};
                        
                        if (data.urls && Object.keys(data.urls).length > 0) {
                            for (let q in data.urls) {
                                videoQualities[q] = `https://aurora-backend-tu8d.onrender.com/play?url=${encodeURIComponent(data.urls[q])}`;
                            }
                        } 
                        else if (data.url) { 
                            videoQualities['Auto'] = `https://aurora-backend-tu8d.onrender.com/play?url=${encodeURIComponent(data.url)}`;
                        }

                        const availableQualities = Object.keys(videoQualities);
                        currentQuality = availableQualities[availableQualities.length - 1]; 
                        
                        video.src = videoQualities[currentQuality]; 
                        renderQualityOptions(); 

                        videoTitle.textContent = "Playing Video ID: " + videoId;
                        isVideoLoaded = true;

                    } else {
                        loadingSpinner.style.display = 'none'; // Error aane par gayab karna padega
                        throw new Error(data.error);
                    }
                } catch (error) {
                    loadingSpinner.style.display = 'none';
                    centerBtn.style.display = 'flex';
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = 'Backend Error: ' + error.message;
                    videoTitle.textContent = "Error Loading Video";
                }
            } else {
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Koi video link nahi mila. Format: ?v=1xkLw';
                videoTitle.textContent = "No Video Found";
                
                videoQualities = { 'Demo 480p': 'https://www.w3schools.com/html/mov_bbb.mp4' };
                currentQuality = 'Demo 480p';
                video.src = videoQualities[currentQuality];
                renderQualityOptions();
                videoTitle.textContent = "Demo Video Playing";
                isVideoLoaded = true;
            }
        }

        loadVideoFromURL();

        // ==========================================
        // UI & CONTROLS LOGIC
        // ==========================================
        function showControls() {
            playerWrapper.classList.add('show-controls');
            clearTimeout(hideControlsTimer);
            if (!video.paused && !isSeeking) {
                hideControlsTimer = setTimeout(() => {
                    playerWrapper.classList.remove('show-controls');
                    speedMenu.classList.remove('open'); 
                    qualityMenu.classList.remove('open');
                }, 2000); 
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function togglePlay() {
            if (!isVideoLoaded) return;
            if (video.paused) {
                video.play().catch(e => {
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = 'Playback error: Shayad broken link hai.';
                });
            } else {
                video.pause();
            }
        }

        playBtn.addEventListener('click', togglePlay);
        
        centerBtn.addEventListener('click', (e) => {
            e.stopPropagation(); 
            togglePlay();
        });

        video.addEventListener('play', () => {
            const pauseSvg = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />';
            playIcon.innerHTML = pauseSvg;
            centerIcon.innerHTML = pauseSvg;
            showControls(); 
            errorMessage.style.display = 'none'; 
        });

        video.addEventListener('pause', () => {
            const playSvg = '<path d="M8 5v14l11-7z" />';
            playIcon.innerHTML = playSvg;
            centerIcon.innerHTML = playSvg;
            playerWrapper.classList.add('show-controls'); 
            clearTimeout(hideControlsTimer);
        });

        video.addEventListener('error', () => {
            if(video.src) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Error: Video load nahi ho paayi.';
                isVideoLoaded = false;
                loadingSpinner.style.display = 'none';
            }
        });

        let lastTapTime = 0;
        let tapTimeout;
        let skipLeftTimer, skipRightTimer;

        function showSkipBadge(direction) {
            if (direction === 'left') {
                skipBadgeLeft.classList.add('show');
                clearTimeout(skipLeftTimer);
                skipLeftTimer = setTimeout(() => skipBadgeLeft.classList.remove('show'), 600);
            } else {
                skipBadgeRight.classList.add('show');
                clearTimeout(skipRightTimer);
                skipRightTimer = setTimeout(() => skipBadgeRight.classList.remove('show'), 600);
            }
        }

        video.addEventListener('pointerup', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;

            if (tapLength < 300 && tapLength > 0) {
                clearTimeout(tapTimeout); 
                const rect = playerWrapper.getBoundingClientRect();
                const x = e.clientX - rect.left;
                
                if (x < rect.width / 2) {
                    video.currentTime = Math.max(0, video.currentTime - 5);
                    showSkipBadge('left');
                } else {
                    video.currentTime = Math.min(video.duration, video.currentTime + 5);
                    showSkipBadge('right');
                }
            } else {
                tapTimeout = setTimeout(() => {
                    if (e.pointerType === 'touch' || e.pointerType === 'pen') {
                        if (playerWrapper.classList.contains('show-controls')) {
                            playerWrapper.classList.remove('show-controls');
                            clearTimeout(hideControlsTimer);
                            speedMenu.classList.remove('open');
                            qualityMenu.classList.remove('open');
                        } else {
                            showControls();
                        }
                    } else {
                        togglePlay();
                    }
                }, 250); 
            }
            lastTapTime = currentTime;
        });

        playerWrapper.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch') return; 
            showControls();
        });

        playerWrapper.addEventListener('pointerleave', (e) => {
            if (e.pointerType === 'touch') return;
            if (!video.paused && !isSeeking) {
                playerWrapper.classList.remove('show-controls');
            }
        });

        video.addEventListener('timeupdate', () => {
            const pct = (video.currentTime / video.duration) * 100;
            progressBar.style.width = `${pct}%`;
            currentTimeEl.textContent = formatTime(video.currentTime);
        });

        video.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(video.duration);
        });

        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const pct = (bufferedEnd / video.duration) * 100;
                bufferBar.style.width = `${pct}%`;
            }
        });

        function seek(clientX) {
            const rect = progressContainer.getBoundingClientRect();
            let pct = (clientX - rect.left) / rect.width;
            pct = Math.max(0, Math.min(1, pct));
            video.currentTime = pct * video.duration;
            progressBar.style.width = `${pct * 100}%`;
        }

        progressContainer.addEventListener('mousedown', (e) => { 
            isSeeking = true; clearTimeout(hideControlsTimer); seek(e.clientX); 
        });
        document.addEventListener('mousemove', (e) => { if (isSeeking) seek(e.clientX); });
        document.addEventListener('mouseup', () => { if (isSeeking) { isSeeking = false; showControls(); }});

        progressContainer.addEventListener('touchstart', (e) => { 
            isSeeking = true; clearTimeout(hideControlsTimer); seek(e.touches[0].clientX); 
        }, {passive: true});
        document.addEventListener('touchmove', (e) => { if (isSeeking) { e.preventDefault(); seek(e.touches[0].clientX); } }, {passive: false});
        document.addEventListener('touchend', () => { if (isSeeking) { isSeeking = false; showControls(); }});

        progressContainer.addEventListener('mousemove', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            let pct = (e.clientX - rect.left) / rect.width;
            pct = Math.max(0, Math.min(1, pct));
            const time = pct * video.duration;
            timeTooltip.textContent = formatTime(time);
            timeTooltip.style.left = `${e.clientX - rect.left}px`;
        });

        // ==========================================
        // SINGLE BUTTON MUTE LOGIC (NO SLIDER)
        // ==========================================
        updateVolumeIcon(); 

        volumeBtn.addEventListener('click', () => {
            if (video.muted || video.volume === 0) {
                video.muted = false;
                video.volume = lastVolume > 0 ? lastVolume : 1;
            } 
            else {
                lastVolume = video.volume > 0 ? video.volume : 1;
                video.volume = 0;
                video.muted = true;
            }
            updateVolumeIcon();
        });

        function updateVolumeIcon() {
            const vol = video.volume;
            if (video.muted || vol === 0) {
                volumeIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />';
            } else if (vol < 0.5) {
                volumeIcon.innerHTML = '<path d="M7 9v6h4l5 5V4l-5 5H7z" />';
            } else {
                volumeIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />';
            }
        }

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenIcon.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" />';
            } else {
                fullscreenIcon.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />';
            }
        });

        // Toggle Menus
        speedBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            qualityMenu.classList.remove('open'); 
            speedMenu.classList.toggle('open');
        });

        qualityBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speedMenu.classList.remove('open'); 
            qualityMenu.classList.toggle('open');
        });

        document.querySelectorAll('.speed-option').forEach(btn => {
            btn.addEventListener('click', () => {
                const speed = parseFloat(btn.dataset.speed);
                video.playbackRate = speed;
                speedBtn.textContent = `${speed}x`;

                document.querySelectorAll('.speed-option').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                speedMenu.classList.remove('open');
            });
        });

        document.addEventListener('click', (e) => {
            if (!speedMenu.contains(e.target) && e.target !== speedBtn) {
                speedMenu.classList.remove('open');
            }
            if (!qualityMenu.contains(e.target) && e.target !== qualityBtn) {
                qualityMenu.classList.remove('open');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (!isVideoLoaded) return;
            showControls();
            switch (e.key) {
                case ' ':
                case 'k':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    video.currentTime = Math.min(video.duration, video.currentTime + 5);
                    showSkipBadge('right');
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    video.currentTime = Math.max(0, video.currentTime - 5);
                    showSkipBadge('left');
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if(video.muted) video.muted = false;
                    video.volume = Math.min(1, video.volume + 0.05);
                    updateVolumeIcon();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    video.volume = Math.max(0, video.volume - 0.05);
                    updateVolumeIcon();
                    break;
                case 'f':
                    fullscreenBtn.click();
                    break;
                case 'm':
                    volumeBtn.click();
                    break;
            }
        });

        video.addEventListener('ended', () => {
            const playSvg = '<path d="M8 5v14l11-7z" />';
            playIcon.innerHTML = playSvg;
            centerIcon.innerHTML = playSvg;
            playerWrapper.classList.add('show-controls');
        });

        // Video par right click ya long press block karne ke liye (Download rokne ke liye)
        video.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        }, false);

    </script>
</body>
</html>
